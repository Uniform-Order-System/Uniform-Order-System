<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in - Order Desk</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4A">
<style>
  body.login-body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: white; border: 1px solid var(--line); border-radius: 12px; padding: 36px; width: 340px; max-width: 90vw; }
  .login-brand { text-align: center; margin-bottom: 24px; }
  .login-brand .mark { font-size: 28px; color: var(--brass); }
  .login-brand h1 { font-size: 18px; margin: 6px 0 2px; }
  .login-brand p { font-size: 12px; color: var(--thread-gray); margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .login-card label { display: block; font-size: 12px; color: var(--thread-gray); margin: 14px 0 4px; }
  .login-card input { width: 100%; padding: 9px 10px; border: 1px solid var(--line); border-radius: 6px; font-family: var(--sans); font-size: 14px; }
  .login-card button { width: 100%; margin-top: 20px; padding: 11px; background: var(--navy); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
  .login-card button:hover { background: var(--navy-deep); }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 12px; display: none; }
</style>
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand">
    <div class="mark">⁘</div>
    <h1>Order Desk</h1>
    <p>Uniform Manufacturing</p>
  </div>
  <form id="login-form">
    <label>Username</label>
    <input id="username" autocomplete="username" required>
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <div class="login-error" id="login-error"></div>
    <button type="submit">Log in</button>
  </form>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value
    })
  });
  if (res.ok) {
    window.location.href = '/';
  } else {
    const data = await res.json().catch(() => ({}));
    errEl.textContent = data.error || 'Login failed.';
    errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
